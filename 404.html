    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --blue:   #29ABE2;
      --orange: #FF9600;
      --tan:    #C69C6D;
      --ink:    #1F2A36;
      --slate:  #5A6772;
      --paper:  #FAF7F2;
      --white:  #FFFFFF;
      --border: rgba(31,42,54,0.10);
      --serif:  "Source Serif 4", Georgia, serif;
      --sans:   "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      --ease:   cubic-bezier(0.22,0.61,0.36,1);
    }

    html, body { height: 100%; }

    body {
      font-family: var(--sans);
      font-size: 16px;
      line-height: 1.55;
      color: var(--ink);
      background: var(--paper);
      -webkit-font-smoothing: antialiased;

    /* Grain */

    .wrap {

      padding: 0 40px;

    /* Nav */

      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      box-shadow: 0 1px 0 rgba(31,42,54,0.07);

    .nav-logo img { width: 150px; height: auto; }

    /* Main */

      justify-content: center;
      padding: 80px 0;
    }

    .error-block {

      max-width: 520px;
    }

    .error-code {
      font-family: var(--serif);
      font-size: clamp(80px, 15vw, 140px);
      font-weight: 600;
      color: var(--ink);
      line-height: 1;
      letter-spacing: -0.03em;
      margin-bottom: 4px;
      opacity: 0.08;
    }

    .error-rule {
      width: 40px;
      height: 2px;
      background: var(--orange);
      margin: 0 auto 28px;
    }

    .error-heading {
      font-family: var(--serif);
      font-size: clamp(22px, 3vw, 28px);
      font-weight: 600;
      color: var(--ink);
      line-height: 1.2;
      margin-bottom: 16px;
    }

    .error-sub {

      font-size: 15px;
      font-weight: 700;
      line-height: 1;
      padding: 14px 28px;
      border-radius: 4px;
      text-decoration: none;
      background: var(--orange);
      color: var(--white);
      transition: background 140ms var(--ease), transform 140ms var(--ease), box-shadow 140ms var(--ease);
    }
    .btn:hover {
      background: #C46F00;
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(0,0,0,0.12);
    }

    /* Footer */
    footer {
      background: var(--ink);
      padding: 36px 0;
    }
    .ft-bottom {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 12px;
    }
    .ft-copy {
      font-size: 13px;
      color: rgba(250,247,242,0.33);
    }
    .ft-tagline {
      font-family: var(--serif);
      font-style: italic;
      font-size: 15px;
      color: rgba(250,247,242,0.50);

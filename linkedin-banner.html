<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Source+Serif+4:ital,opsz,wght@0,8..60,600;1,8..60,600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 1584px;
      height: 396px;
      overflow: hidden;
      background: #FAF7F2;
    }

    .banner {
      width: 1584px;
      height: 396px;
      position: relative;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Light neutral gradient */
    .bg {
      position: absolute;
      inset: 0;
      background: linear-gradient(125deg,
        #FFFFFF 0%,
        #FAF7F2 30%,
        #F5F3EF 58%,
        #F0EFED 78%,
        #E9E7E4 100%
      );
    }

    /* Right-side oxblood bloom */
    .bloom {
      position: absolute;
      right: -100px;
      top: -80px;
      width: 700px;
      height: 700px;
      background: radial-gradient(ellipse, rgba(102,0,0,0.09) 0%, transparent 65%);
    }

    /* Vignette */
    .vignette {
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg,
        rgba(26,26,26,0.06) 0%,
        transparent 35%,
        transparent 65%,
        rgba(26,26,26,0.10) 100%
      );
    }

    /* Oxblood top rule */
    .top-rule {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(90deg, transparent 0%, #660000 30%, #660000 70%, transparent 100%);
    }

    /* Content — centered, safe from logo overlay (bottom-left ~130px x 130px) */
    .content {
      position: relative;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      gap: 20px;
      padding-bottom: 20px;
      /* Shift slightly right to visually balance with logo overlay on left */
      margin-left: 80px;
    }

    .eyebrow {
      font-family: "Inter", sans-serif;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: rgba(26,26,26,0.45);
    }

    .tagline {
      font-family: "Source Serif 4", Georgia, serif;
      font-size: 58px;
      font-weight: 600;
      color: #1A1A1A;
      line-height: 1.08;
      letter-spacing: -0.015em;
    }

    .tagline .accent {
      font-style: italic;
      color: #5A6772;
    }

    .divider {
      width: 52px;
      height: 2px;
      background: #660000;
    }

    .sub {
      font-family: "Inter", sans-serif;
      font-size: 14px;
      font-weight: 400;
      letter-spacing: 0.10em;
      text-transform: uppercase;
      color: #5A6772;
    }

    .url {
      position: absolute;
      bottom: 22px;
      right: 52px;
      font-family: "Inter", sans-serif;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.08em;
      color: rgba(26,26,26,0.30);
      z-index: 10;
    }
  </style>
</head>
<body>
  <div class="banner">
    <div class="bg"></div>
    <div class="bloom"></div>

    <div class="vignette"></div>
    <div class="top-rule"></div>

    <div class="content">
      <div class="eyebrow">Class IX Consulting &nbsp;·&nbsp; cixcon.com</div>
      <div class="tagline">
        Clarity. Accountability.<br><span class="accent">Ownership.</span> Partnership.
      </div>
      <div class="divider"></div>
      <div class="sub">Strategy &nbsp;·&nbsp; Operations &nbsp;·&nbsp; Logistics &nbsp;·&nbsp; Digital Transformation &nbsp;·&nbsp; Leadership</div>
    </div>

    <div class="url">cixcon.com</div>
  </div>
  <script>
  (function(){
    var o = document.createElement('div');
    o.style.cssText = 'position:fixed;inset:0;background:#FAF7F2;opacity:1;pointer-events:auto;z-index:10000;transition:opacity 260ms cubic-bezier(0.22,0.61,0.36,1)';
    document.body.appendChild(o);
    function reveal(){ o.style.opacity='0'; o.style.pointerEvents='none'; }
    requestAnimationFrame(function(){ requestAnimationFrame(reveal); });
    setTimeout(reveal, 100);
    document.addEventListener('click', function(e) {
      var a = e.target.closest('a[href]');
      if (!a) return;
      var h = a.getAttribute('href');
      if (!h || h[0]==='#' || /^(https?:|mailto:|tel:)/.test(h) || a.target==='_blank') return;
      e.preventDefault();
      o.style.opacity='1'; o.style.pointerEvents='auto';
      setTimeout(function(){ window.location.href=h; }, 260);
    });
    window.addEventListener('pageshow', function(e) {
      if (e.persisted) { o.style.opacity='0'; o.style.pointerEvents='none'; }
    });
  })();
  </script>
</body>
</html>
